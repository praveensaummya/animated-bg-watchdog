<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEDSEC // ROUGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --dedsec-red: #ff0033;
            --bg-dark: #020202;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'IBM Plex Mono', monospace;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        /* CRT/Scanline Overlays */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.15) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04)
            );
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.6;
        }

         /* PCB Circuit Styles */
        .circuit {
            fill: none;
            stroke-width: 1.2;
            stroke-linecap: square;
            stroke-linejoin: miter;
            filter: drop-shadow(0 0 3px var(--neon-cyan));
            opacity: 0.12;
        }

        .circuit-pink {
            stroke: var(--neon-pink);
            filter: drop-shadow(0 0 3px var(--neon-pink));
        }

        .solder-point {
            stroke-width: 1;
            fill: none;
            opacity: 0.2;
        }

        /* Flickering Animation */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }

        .flicker {
            animation: flicker 6s infinite;
        }

        /* Background Grid */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, #111 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

         .glitch-container {
            position: relative;
            transform-style: preserve-3d;
        }

         /* Network Nodes - Background Layer */
         .network-nodes-bg {
             position: fixed;
             inset: 0;
             width: 100%;
             height: 100%;
             z-index: 0;
             pointer-events: none;
         }
         
         .node {
             fill: var(--neon-cyan);
             opacity: 0.15;
         }
         
         .connection-line {
             stroke: var(--neon-cyan);
             stroke-width: 0.5;
             opacity: 0.05;
         }
         
         /* Logo - Foreground Layer */
         .logo-foreground {
             position: fixed;
             inset: 0;
             width: 100%;
             height: 100%;
             z-index: 10;
             pointer-events: none;
             display: flex;
             align-items: center;
             justify-content: center;
         }

        /* Encryption Bar */
        .encryption-bar {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2px;
            z-index: 50;
            pointer-events: none;
            opacity: 0.4;
        }

        .encryption-block {
            width: 4px;
            height: 20px;
            background: var(--neon-cyan);
            opacity: 0.3;
        }

        @keyframes encryptFlash {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Firewall Status */
        .firewall-status {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--neon-green);
            opacity: 0.3;
            z-index: 50;
            pointer-events: none;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        /* Packet Flow */
        .packet {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--neon-pink);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--neon-pink);
            opacity: 0;
            pointer-events: none;
        }

        @keyframes packetFlow {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="bg-grid"></div>

     <!-- Network Nodes Layer - Background -->
     <svg id="network-layer" class="network-nodes-bg"></svg>

     <!-- Main Logo Wrapper - Foreground -->
     <div class="logo-foreground">
         <div class="glitch-container opacity-60" style="filter: url(#glitch-filter)">
             <svg id="dedsec-logo" width="300" height="300" viewBox="10 10 80 90">
                
                 <!-- V Letter - Main Red Logo -->
                <path id="logo-v" d="M25 35 L50 80 L75 35" fill="none" stroke="var(--dedsec-red)" stroke-width="1.2" stroke-linejoin="miter" stroke-linecap="square" />

                <!-- W Letter - Main Red Logo -->
                <path id="logo-w" d="M25 35 V 70 L 50 45 L 75 70 V 35" fill="none" stroke="var(--dedsec-red)" stroke-width="1.2" stroke-linejoin="miter" stroke-linecap="square" />

                <!-- High Frequency Glitch Layers - Calibrated to match V and W -->
                <g id="glitch-layers" opacity="0.5">
                    <path id="ghost-cyan-v" d="M25 35 L50 80 L75 35" fill="none" stroke="var(--neon-cyan)" stroke-width="0.4" opacity="0.6"/>
                    <path id="ghost-green-w" d="M25 35 V 70 L 50 45 L 75 70 V 35" fill="none" stroke="var(--neon-green)" stroke-width="0.4" opacity="0.6"/>
                </g>
            </svg>
        </div>
     </div>

    <!-- Header Stats -->
    <header class="fixed top-0 left-0 w-full p-6 z-20 flex justify-between items-start pointer-events-none">
        <div class="bg-black/30 p-3 border-l-2 border-cyan-500/10 backdrop-blur-sm opacity-40">
            <div class="text-xs font-bold mb-1 flex items-center">
                <span class="text-white/70 mr-2 lowercase font-normal">rouger :~ $</span>
                <span id="typewriter-top" class="text-cyan-400/60 lowercase font-light"></span>
                <span class="w-1.5 h-3.5 bg-cyan-400/40 animate-pulse ml-1"></span>
            </div>
            <div class="text-[9px] opacity-20 uppercase tracking-[0.2em] font-light">dedsec_network_override :: active</div>
        </div>
        
        <div class="flicker opacity-30">
            <svg width="45" height="45" viewBox="0 0 100 100" class="fill-cyan-400">
                <path d="M50 5 L90 45 L50 85 L10 45 Z" fill="none" stroke="currentColor" stroke-width="1"/>
                <path d="M50 15 L80 45 L50 75 L20 45 Z" />
                <rect x="48" y="43" width="4" height="4" fill="white" />
            </svg>
        </div>
    </header>

    <!-- Bottom Stat Bar -->
    <footer class="fixed bottom-0 left-0 w-full p-6 z-50 flex justify-between items-end pointer-events-none">
        <div class="text-[10px] space-y-1 opacity-20 font-light">
            <div>IP_TRACE: <span class="text-pink-600">failed</span></div>
            <div>UPLINK: <span class="text-cyan-600">stable</span></div>
            <div class="text-[8px] opacity-10 uppercase tracking-widest">© dedsec // all rights exposed</div>
        </div>

        <div class="flicker opacity-15" style="animation-delay: 2s;">
            <svg width="35" height="35" viewBox="0 0 100 100" class="fill-pink-500">
                 <path d="M50 10 L90 50 L50 90 L10 50 Z" />
            </svg>
        </div>
    </footer>

    <script>


        // --- 2. Header Typewriter ---
         const headText = "sudo wrench_protocol --execute --bypass-firewall";
        const headEl = document.getElementById('typewriter-top');
        let headIdx = 0;
        function typeHead() {
            if (headIdx < headText.length) {
                headEl.textContent += headText.charAt(headIdx);
                headIdx++;
                setTimeout(typeHead, 80);
            } else {
                setTimeout(() => { headEl.textContent = ""; headIdx = 0; typeHead(); }, 8000);
            }
        }
        typeHead();

         // --- 3. Chaotic Glitch Animation ---
        const dispMap = document.getElementById('displacement-map');
        const logoWrapper = document.querySelector('.logo-foreground');
        const logoV = document.getElementById('logo-v');
        const logoW = document.getElementById('logo-w');
        const ghostV = document.getElementById('ghost-cyan-v');
        const ghostW = document.getElementById('ghost-green-w');
        
         function glitchLoop() {
            const timeline = anime.timeline({
                easing: 'steps(2)', 
                complete: () => setTimeout(glitchLoop, anime.random(2000, 5000))
            });

            timeline
            .add({
                targets: dispMap,
                scale: [0, 25, 0, 15, 0],
                duration: 300
            })
            .add({
                targets: '#dedsec-logo',
                opacity: [0.6, 0.95, 0.4, 0.95, 0.6], 
                duration: 200,
                offset: 0
            })
            .add({
                targets: logoWrapper,
                translateX: [
                    { value: () => anime.random(-60, 60), duration: 40 },
                    { value: () => anime.random(-30, 30), duration: 40 },
                    { value: 0, duration: 40 }
                ],
                translateY: [
                    { value: () => anime.random(-30, 30), duration: 40 },
                    { value: () => anime.random(-20, 20), duration: 40 },
                    { value: 0, duration: 40 }
                ],
                offset: 0
            })
            .add({
                targets: [ghostV, ghostW],
                stroke: [
                    { value: '#ff0033', duration: 80 },
                    { value: '#00f2ff', duration: 80 },
                    { value: '#ff0033', duration: 80 }
                ],
                opacity: [0.5, 0.8, 0.3, 0.6, 0],
                translateX: () => anime.random(-15, 15),
                translateY: () => anime.random(-8, 8),
                duration: 300,
                offset: 0
            })
            .add({
                targets: [logoV, logoW],
                stroke: [
                    { value: '#ff0033', duration: 1 },
                    { value: '#ff3366', duration: 60 },
                    { value: '#ff0033', duration: 60 }
                ],
                opacity: [1, 0.8, 1],
                duration: 120,
                offset: 0
            });
        }
        
        // Start glitch loop with random initial delay to prevent pattern caching
        setTimeout(glitchLoop, Math.random() * 1000 + 200);

         // --- 5. Network Nodes Visualization ---
         const networkLayer = document.getElementById('network-layer');
         const nodes = [];
         const connections = [];
         let nodePulseInterval = null;
         let currentClusterPattern = 0;
         
         // Define different cluster patterns
         const clusterPatterns = [
             { nodeCount: 8,  connectionDistance: 180, pulseChance: 0.5 },  // Dense cluster
             { nodeCount: 12, connectionDistance: 250, pulseChance: 0.4 },  // Medium spread
             { nodeCount: 6,  connectionDistance: 150, pulseChance: 0.6 },  // Tight cluster
             { nodeCount: 10, connectionDistance: 200, pulseChance: 0.45 }  // Balanced
         ];
         
         function createNetworkNodes(patternIndex) {
             const pattern = clusterPatterns[patternIndex];
             
             // Clear existing nodes and connections first
             while (networkLayer.firstChild) {
                 networkLayer.removeChild(networkLayer.firstChild);
             }
             nodes.length = 0;
             connections.length = 0;
             
             // Create nodes with fresh random positions
             for (let i = 0; i < pattern.nodeCount; i++) {
                 const node = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                 const x = 100 + Math.random() * (window.innerWidth - 200);
                 const y = 100 + Math.random() * (window.innerHeight - 200);
                 const r = 2 + Math.random() * 3;
                 
                 node.setAttribute('cx', x);
                 node.setAttribute('cy', y);
                 node.setAttribute('r', r);
                 node.setAttribute('class', 'node');
                 
                 networkLayer.appendChild(node);
                 nodes.push({ element: node, x, y, r, active: false });
             }
             
             // Create connections between nearby nodes
             for (let i = 0; i < nodes.length; i++) {
                 for (let j = i + 1; j < nodes.length; j++) {
                     const dx = nodes[i].x - nodes[j].x;
                     const dy = nodes[i].y - nodes[j].y;
                     const dist = Math.sqrt(dx * dx + dy * dy);
                     
                     if (dist < pattern.connectionDistance) {
                         const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                         line.setAttribute('x1', nodes[i].x);
                         line.setAttribute('y1', nodes[i].y);
                         line.setAttribute('x2', nodes[j].x);
                         line.setAttribute('y2', nodes[j].y);
                         line.setAttribute('class', 'connection-line');
                         line.style.opacity = 0.05 + Math.random() * 0.08;
                         
                         networkLayer.appendChild(line);
                         connections.push({ element: line, from: i, to: j });
                     }
                 }
             }
             
             // Animate nodes with faster pulsing
             function pulseNodes() {
                 nodes.forEach((node, idx) => {
                     if (Math.random() > pattern.pulseChance) {
                         anime({
                             targets: node.element,
                             opacity: [0.1, 0.6, 0.1],
                             r: [node.r, node.r * 1.8, node.r],
                             duration: 800 + Math.random() * 600,
                             easing: 'easeInOutSine'
                         });
                         
                         // Pulse connected lines
                         connections.forEach(conn => {
                             if (conn.from === idx || conn.to === idx) {
                                 anime({
                                     targets: conn.element,
                                     opacity: [0.05, 0.3, 0.05],
                                     strokeWidth: [0.5, 1.2, 0.5],
                                     duration: 500,
                                     easing: 'easeInOutSine'
                                 });
                             }
                         });
                     }
                 });
                 
                 // Faster pulsing: 1.5 to 3 seconds
                 nodePulseInterval = setTimeout(pulseNodes, 1500 + Math.random() * 1500);
             }
             
             pulseNodes();
         }
         
         // Cycle through patterns: stay for 3-4 seconds, then faster selection
         function cycleClusterPattern() {
             // Select random pattern
             const newPattern = Math.floor(Math.random() * clusterPatterns.length);
             currentClusterPattern = newPattern;
             
             createNetworkNodes(newPattern);
             
             // Stay for 3-4 seconds, then faster selection (1-2 seconds)
             const stayTime = 3000 + Math.random() * 1000;
             const nextTime = 1000 + Math.random() * 1000;
             
             setTimeout(() => {
                 cycleClusterPattern();
             }, stayTime);
         }
         
         // Start with initial pattern
         createNetworkNodes(0);
         
         // Begin cycling after 3-4 seconds
         setTimeout(() => {
             cycleClusterPattern();
         }, 3500);

        // --- 7. Threat Detection Radar ---
        const threatRadar = document.getElementById('threat-radar');
        
        function createRadarSweep() {
            const sweep = document.createElement('div');
            sweep.className = 'radar-sweep';
            sweep.style.left = '50%';
            sweep.style.top = '50%';
            sweep.style.animation = 'radarPulse 4s ease-out infinite';
            
            threatRadar.appendChild(sweep);
            
            setTimeout(() => {
                if (sweep.parentNode) {
                    sweep.parentNode.removeChild(sweep);
                }
            }, 4000);
        }
        
        // Create threat dots
        function createThreatDot() {
            const dot = document.createElement('div');
            dot.className = 'threat-dot';
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.top = Math.random() * 100 + 'vh';
            dot.style.animation = 'threatAppear 3s ease-in-out infinite';
            dot.style.animationDelay = Math.random() * 2 + 's';
            
            threatRadar.appendChild(dot);
            
            setTimeout(() => {
                if (dot.parentNode) {
                    dot.parentNode.removeChild(dot);
                }
            }, 6000);
        }
        
        // Start radar sweeps
        setInterval(createRadarSweep, 5000);
        
        // Create initial threat dots
        for (let i = 0; i < 5; i++) {
            setTimeout(() => createThreatDot(), i * 1500);
        }
        
        // Continue creating threat dots
        setInterval(createThreatDot, 8000);

        // --- 8. Encryption Activity Bar ---
        const encryptionBar = document.createElement('div');
        encryptionBar.className = 'encryption-bar';
        
        for (let i = 0; i < 32; i++) {
            const block = document.createElement('div');
            block.className = 'encryption-block';
            block.style.animation = `encryptFlash 2s ease-in-out infinite`;
            block.style.animationDelay = (Math.random() * 2) + 's';
            encryptionBar.appendChild(block);
        }
        
        document.body.appendChild(encryptionBar);

        // --- 9. Firewall Status Indicator ---
        const firewallStatus = document.createElement('div');
        firewallStatus.className = 'firewall-status';
        firewallStatus.innerHTML = 'FIREWALL<br>ACTIVE<br>SECURE<br>CONNECTION';
        document.body.appendChild(firewallStatus);

        // --- 10. Data Packet Flow ---
        function createDataPacket() {
            const packet = document.createElement('div');
            packet.className = 'packet';
            packet.style.left = Math.random() * 100 + 'vw';
            packet.style.top = Math.random() * 100 + 'vh';
            packet.style.animation = `packetFlow ${2 + Math.random() * 2}s ease-in-out infinite`;
            packet.style.animationDelay = Math.random() * 2 + 's';
            
            document.body.appendChild(packet);
            
            setTimeout(() => {
                if (packet.parentNode) {
                    packet.parentNode.removeChild(packet);
                }
            }, 5000);
        }
        
        // Create initial packets
        for (let i = 0; i < 8; i++) {
            setTimeout(() => createDataPacket(), i * 500);
        }
        
        // Continue creating packets
        setInterval(createDataPacket, 3000);

        // --- 11. Breach Alert System ---
        function triggerBreachAlert() {
            const alert = document.createElement('div');
            alert.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                font-family: 'IBM Plex Mono', monospace;
                font-size: 11px;
                color: var(--dedsec-red);
                opacity: 0;
                z-index: 100;
                pointer-events: none;
                text-transform: uppercase;
                letter-spacing: 2px;
            `;
            alert.textContent = '>>> Security Breach Detected <<<';
            document.body.appendChild(alert);
            
            anime({
                targets: alert,
                opacity: [0, 0.8, 0],
                translateX: [-20, 0, 0],
                duration: 3000,
                easing: 'easeInOutSine',
                complete: () => {
                    if (alert.parentNode) {
                        alert.parentNode.removeChild(alert);
                    }
                }
            });
        }
        
        // Random breach alerts
        setInterval(() => {
            if (Math.random() > 0.7) {
                triggerBreachAlert();
            }
        }, 15000);

        // --- 12. System Status Monitor ---
        function createSystemStatus() {
            const status = document.createElement('div');
            status.style.cssText = `
                position: fixed;
                bottom: 120px;
                left: 20px;
                font-family: 'IBM Plex Mono', monospace;
                font-size: 9px;
                color: var(--neon-cyan);
                opacity: 0.2;
                z-index: 50;
                pointer-events: none;
                line-height: 1.8;
            `;
            status.innerHTML = 
                'SYSTEM: ONLINE<br>' +
                'NODES: ' + nodes.length + '<br>' +
                'CONNS: ' + connections.length + '<br>' +
                'STATUS: SECURE';
            document.body.appendChild(status);
        }
        
         createSystemStatus();

         // --- 13. Interactive Parallax ---
         document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX / window.innerWidth - 0.5) * 8;
            const moveY = (e.clientY / window.innerHeight - 0.5) * 8;
            const logo = document.getElementById('dedsec-logo');
            if(logo) {
                logo.parentElement.style.transform = `translate(${moveX * -0.2}px, ${moveY * -0.2}px) rotateX(${moveY * 0.1}deg) rotateY(${moveX * -0.1}deg)`;
            }
        });

        // --- 14. Force Re-render on Page Load (Fix for Vercel SSR caching) ---
        function forceReRender() {
            // Force glitch loop to restart with new random values
            const logoWrapper = document.querySelector('.logo-foreground');
            if (logoWrapper) {
                logoWrapper.style.opacity = '0.59';
                setTimeout(() => {
                    logoWrapper.style.opacity = '0.6';
                }, 50);
            }

            // Force a glitch effect immediately
            const dispMap = document.getElementById('displacement-map');
            if (dispMap) {
                anime({
                    targets: dispMap,
                    scale: [0, 30, 0],
                    duration: 200,
                    easing: 'easeInOutSine'
                });
            }
            
            // Trigger faster cluster pattern change
            if (typeof cycleClusterPattern === 'function') {
                // Clear any existing intervals
                if (nodePulseInterval) {
                    clearTimeout(nodePulseInterval);
                }
                // Force immediate pattern change
                setTimeout(() => {
                    cycleClusterPattern();
                }, 100);
            }
        }

        // Initialize everything when DOM is fully loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(forceReRender, 100);
                setTimeout(forceReRender, 500);
            });
        } else {
            setTimeout(forceReRender, 100);
            setTimeout(forceReRender, 500);
        }

        // Also force re-render on window load (for Vercel)
        window.addEventListener('load', () => {
            setTimeout(forceReRender, 200);
            setTimeout(forceReRender, 800);
        });

        // Force re-render on page visibility change (for browser caching)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                setTimeout(forceReRender, 100);
            }
        });
    </script>
</body>
</html>
